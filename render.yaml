services:
  - type: web
    name: supply-chain-mcp-server
    runtime: python
    buildCommand: pip install -r requirements.txt && python build.py
    startCommand: python mcp_server/server.py
    envVars:
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DBT_DB_PATH
        value: /opt/render/project/src/db/supply_chain.db
      - key: DBT_SCHEMA_DIR
        value: /opt/render/project/src/db